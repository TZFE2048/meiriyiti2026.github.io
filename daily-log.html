<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>每日做答记录 - 2026 每日一题</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <a href="/">🏠 首页</a>
    <a href="/schedule.html">赛程介绍</a>
    <a href="/rankings.html">赛季排行</a>
    <a href="/ranks.html">段位介绍</a>
    <a href="/achievements.html">成就一览</a>
    <a href="/difficulty.html">难度机制</a>
    <a href="/hall-of-fame.html">赛季名人堂</a>
    <a href="/daily-log.html">每日作答记录</a>
  </nav>
  
<div class="container">
  <!-- 月份选择下拉框 -->
  <label for="month-select">选择月份：</label>
  <select id="month-select" onchange="loadMonth(this.value)">
    <option value="">请选择</option>
    <option value="2026-02">2026年2月</option>
    <option value="2026-03" selected>2026年3月</option>
    <!-- 后续可动态生成 -->
  </select>

  <!-- 记录展示区 -->
  <div id="month-log" style="margin-top: 20px;">
    <p>请选择月份查看记录</p>
  </div>
</div>
  <script>
  // 页面加载时自动加载当前月份
  window.onload = function() {
    const now = new Date();
    const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    document.getElementById('month-select').value = currentMonth;
    loadMonth(currentMonth);
  };

  function loadMonth(monthKey) {
    if (!monthKey) return;

    const filePath = `/data/daily/${monthKey}.html`;
    const container = document.getElementById('month-log');
    container.innerHTML = '<p>加载中...</p>';

    fetch(filePath)
      .then(response => response.ok ? response.text() : null)
      .then(html => {
        if (html) {
          container.innerHTML = html;
        } else {
          container.innerHTML = `<p>暂无 ${monthKey} 的记录</p>`;
        }
      })
      .catch(err => {
        console.error("加载失败:", err);
        container.innerHTML = `<p>加载失败，请检查网络或稍后再试</p>`;
      });
  }
</script>
</body>
</html>
